services:
  - type: web
    name: qwen-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --timeout 120 --workers 1 --threads 4"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /workspace/.playwright
